services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: redirect_center
      POSTGRES_USER: redirect_center
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    # volumes:
    #   - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redirect_center -d redirect_center"]
      interval: 2s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://redirect_center:dev_password@postgres:5432/redirect_center
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@redirect.center
      STRIPE_SECRET_KEY: sk_test_51TDSUeFQ8RwVzLyFhzVm8mFpKPuEGELrmNHFmuE0ZDgmMJLDgMRCF7CfTWLegUqzqF7B8ebKiWSzv6ccbAHeUiUg00yfq6H78n
      STRIPE_PUBLISHABLE_KEY: pk_test_51TDSUeFQ8RwVzLyFxb6Ok44olAVujyZGTlpxOv00cnhaD3O6v8YEvayJ7lvc1zbmOAC3K9gtcEjdC56yjNrbswoB00QPIsm0az
      STRIPE_WEBHOOK_SECRET: ""  # Leave empty for dev (skips signature verification). Set in production.
      STRIPE_PRICE_SIMPLE_MONTHLY: price_1TDSaaFQ8RwVzLyFTgyIDRDi
      STRIPE_PRICE_SIMPLE_YEARLY: price_1TDSazFQ8RwVzLyF2T9PyfEU
      STRIPE_PRICE_WILDCARD_MONTHLY: price_1TDSbKFQ8RwVzLyFCee4XgYz
      STRIPE_PRICE_WILDCARD_YEARLY: price_1TDSc0FQ8RwVzLyFusCrIMfE
      BASE_URL: http://localhost:8000
      WEB_PORT: 8000
      SESSION_DURATION_HOURS: 3
      MAGIC_LINK_DURATION_HOURS: 24
      SANDBOX: "true"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  redirect:
    build:
      context: .
      dockerfile: packages/redirect/Dockerfile
    ports:
      - "8180:80"
    environment:
      FQDN: redirect.center
      LISTEN_PORT: 80
      ENTRY_IP: 127.0.0.1
      LOGGER_LEVEL: debug

  certmanager:
    build:
      context: .
      dockerfile: packages/certmanager/Dockerfile
    environment:
      DATABASE_URL: postgresql://redirect_center:dev_password@postgres:5432/redirect_center
      CERT_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ACME_DIRECTORY_URL: https://pebble:14000/dir
      DNS_PROVIDER: pebble
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@redirect.center
      BASE_URL: http://localhost:8000
      VALIDATION_WORKER_INTERVAL_SECONDS: 30
      RENEWAL_WORKER_INTERVAL_SECONDS: 3600
      NOTIFICATION_WORKER_INTERVAL_SECONDS: 3600
    command: ["run", "--allow-net", "--allow-read", "--allow-env", "--allow-write", "--allow-run", "--unsafely-ignore-certificate-errors=pebble", "packages/certmanager/src/main.ts"]
    depends_on:
      postgres:
        condition: service_healthy
      pebble:
        condition: service_started
      mailpit:
        condition: service_started

  proxy:
    build:
      context: .
      dockerfile: packages/proxy/Dockerfile
    ports:
      - "443:443"
    environment:
      DATABASE_URL: postgresql://redirect_center:dev_password@postgres:5432/redirect_center
      CERT_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      FQDN: redirect.center
      WEB_UPSTREAM: http://web:8000
      CADDY_ADMIN_API: http://localhost:2019
      REDIRECT_UPSTREAM: http://redirect:80
      SYNC_INTERVAL_SECONDS: 30
      LOGGER_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redirect:
        condition: service_started
    # volumes:
    #   - cert-data:/certs

  pebble:
    image: ghcr.io/letsencrypt/pebble:latest
    command: ["-config", "/etc/pebble/pebble-config.json"]
    ports:
      - "14000:14000"
      - "15000:15000"
    environment:
      PEBBLE_VA_NOSLEEP: 1
      PEBBLE_VA_ALWAYS_VALID: 1  # Accept all challenges in dev
      PEBBLE_WFE_NONCEREJECT: 0
    volumes:
      - ./docker/pebble/pebble-config.json:/etc/pebble/pebble-config.json:ro

  stripe-cli:
    image: stripe/stripe-cli
    command: listen --forward-to web:8000/api/webhooks/stripe
    environment:
      STRIPE_API_KEY: sk_test_51TDSUeFQ8RwVzLyFhzVm8mFpKPuEGELrmNHFmuE0ZDgmMJLDgMRCF7CfTWLegUqzqF7B8ebKiWSzv6ccbAHeUiUg00yfq6H78n
    depends_on:
      web:
        condition: service_started

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  cert-data:
